<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qr generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>qr generator</h1>
  <p class="hint">text, url, wifi, vcard. renders as you type.</p>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="text">text</button>
    <button class="tab" data-tab="url">url</button>
    <button class="tab" data-tab="wifi">wifi</button>
    <button class="tab" data-tab="vcard">vcard</button>
  </div>

  <section class="panel active" data-panel="text">
    <label>text
      <textarea id="text-input" rows="4" placeholder="anything you want to encode"></textarea>
    </label>
  </section>

  <section class="panel" data-panel="url">
    <label>url
      <input type="url" id="url-input" placeholder="https://example.com">
    </label>
  </section>

  <section class="panel" data-panel="wifi">
    <label>ssid
      <input type="text" id="wifi-ssid" placeholder="network name">
    </label>
    <label>password
      <input type="text" id="wifi-pass" placeholder="leave blank for open network">
    </label>
    <label>encryption
      <select id="wifi-enc">
        <option value="WPA">WPA / WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">none (open)</option>
      </select>
    </label>
  </section>

  <section class="panel" data-panel="vcard">
    <label>full name
      <input type="text" id="vc-name" placeholder="jane doe">
    </label>
    <label>phone
      <input type="tel" id="vc-phone" placeholder="+1 555 0100">
    </label>
    <label>email
      <input type="email" id="vc-email" placeholder="jane@example.com">
    </label>
  </section>

  <div class="controls">
    <label>error correction
      <select id="ecl">
        <option value="L">L (7%)</option>
        <option value="M" selected>M (15%)</option>
        <option value="Q">Q (25%)</option>
        <option value="H">H (30%)</option>
      </select>
    </label>
    <button id="download" type="button">download png</button>
  </div>

  <div class="output">
    <canvas id="qr"></canvas>
    <p id="status" class="status">type something to generate a code</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
